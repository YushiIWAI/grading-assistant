# ============================================================
# 魯迅「故郷」予習プリント 採点基準（中2国語・定期試験型）
# ============================================================
# 出典: 魯迅「故郷」（竹内好訳）
# 形式: 記述式5問（理由説明・容姿比較・心情説明×2・比喩象徴説明）
# ============================================================

exam_info:
  title: "魯迅「故郷」予習プリント（中2国語・定期試験型）"
  total_points: 28
  pages_per_student: 1

notes: |
  【本文の要旨】
  二十年ぶりに故郷に帰った「私」は、幼馴染の閏土（ルントウ）と再会する。かつて
  身分の差を超えて親しく遊んだ閏土は、今では「旦那様」と呼んで身分の差をわきまえた
  態度をとる。海辺での長年の労働で容姿は変わり果て、重い税金や飢饉・盗賊に苦しむ
  生活を送っていた。一方、閏土の息子・水生と「私」の甥・宏児は、かつての二人のように
  自然に親しくなる。「私」は没落した一族の家を引き払い故郷を離れる。末尾で「私」は、
  希望とは地上の道のようなもの、もともとないが歩く人が多くなればそれが道になる、と
  考える。

  【出題の特徴】
  - 定期試験型の予習プリント。全問「説明しなさい」の記述式
  - 心情・反応の「なぜ」型が2問（定期試験の定番）
  - 容姿比較は本文の描写を正確に抜き出し、因果関係も含めて説明する力を問う
  - 比喩・象徴の問いは作品のテーマに関わる深い読解を要求

  【採点上の注意】
  - 本文の具体的な描写・表現に基づいた記述を求める（一般論や印象だけでは不十分）
  - 問二の容姿比較では、外見の列挙だけでなく因果関係の説明も評価する
  - 心情説明では、比喩的表現（「壁ができた」等）をそのまま使わず具体的に説明できているかを見る
  - 問四は子どもたちの関係と大人の関係の対比が核心。閏土の貧困への衝撃は別の場面
  - 【重要】形式点（文末表現「〜から。」「〜こと。」等）は加点方式ではなく減点方式で扱う。
    内容が正しい解答で形式を守っていない場合に-1〜-2点の減点とする。
    内容が的外れ（off_topic）な解答には、形式を守っていても点数を与えてはならない（0点）

questions:
  - id: 1
    description: |
      「この古い家が持ち主を変えるほかなかった理由」を「説き明かし顔」とあるが、
      どのような「理由」か。説明しなさい。
    type: "descriptive"
    max_points: 4
    model_answer: |
      枯れ草や遣れ茎が生えたみっともない屋根を放置しなくてはならないほどに貧しく、
      落ちぶれてしまったため。
    scoring_criteria: |
      【要素A: 2点】屋根に枯れ草・遣れ茎が生えている等、家の荒廃した具体的描写への言及
      【要素B: 2点】それを放置せざるを得ないほど貧しい・一族が没落したことへの言及

      部分点の目安:
      - A+B → 4点（満点）
      - Bのみ（没落だが具体描写なし） → 2点
      - 「家が古くなった」程度 → 0-1点
      - 「引っ越しのため」は設問の意図を読み違えており0点

  - id: 2
    description: |
      少年時代の「閏土」と今の「閏土」の容姿をそれぞれ説明しなさい。
    type: "descriptive"
    max_points: 8
    model_answer: |
      【少年時代】つやのいい丸顔をして、銀の首輪をはめ、小さな毛織りの帽子をかぶった
      元気な少年。
      【現在】背丈は伸びたが、黄ばんだ色と深いしわが刻まれた顔に変わり、海辺で長く
      働いていたせいで目の周りは赤く腫れている。手もひび割れ細くなっている。古びた
      毛織りの帽子を被り、薄手の綿入れを羽織ったみすぼらしい格好をしている。
    scoring_criteria: |
      【少年時代（3点）】
      - A1 (1点): つやのいい丸顔への言及
      - A2 (1点): 銀の首輪・小さな毛織りの帽子など装身具への言及
      - A3 (1点): 元気・健康的な印象

      【現在（5点）】
      - B1 (1点): 黄ばんだ顔色・深いしわへの言及
      - B2 (1点): 海辺で長く働いたせいで目の周りが赤く腫れている（因果関係を含む描写）
      - B3 (1点): 手のひび割れへの言及
      - B4 (1点): 古びた帽子・薄手の綿入れなど服装の具体的描写
      - B5 (1点): みすぼらしい・貧しい全体印象

      注意: 現在の描写は外見の列挙だけでなく、因果関係（B2の「海辺で働いたせいで」等）を
      含む記述をより高く評価する

  - id: 3
    description: |
      「私は身震いしたらしかった」とあるが、なぜ「私」は「身震い」したのか。
      説明しなさい。
    type: "descriptive"
    max_points: 5
    model_answer: |
      かつては身分の差をわきまえることなく様々なことを教えてくれた友人の閏土が、
      「私」を「旦那様」と身分の差をわきまえた言葉遣いをしてきたことで、
      身分の差が二人の関係を変えてしまったことを悟り、悲しい気持ちになったから。
    scoring_criteria: |
      【要素A: 2点】閏土が「旦那様」と身分の差をわきまえた呼び方をしたという具体的出来事
      【要素B: 1点】かつては身分の差を意識せず親しい関係だったことへの言及
      【要素C: 2点】身分の差が二人の関係を変えてしまったことを悟った・悲しい気持ちになった

      注意:
      - 「越えられない壁」等の比喩的表現は避け、具体的に説明しているかを評価
      - 「変わってしまった」だけでは身分の差への言及が不十分

  - id: 4
    description: |
      「私も、私の母も、はっと胸を突かれた。」とあるが、なぜ「胸を突かれた」のか。
      説明しなさい。
    type: "descriptive"
    max_points: 5
    model_answer: |
      「私」とルントウの子どもたち（水生と宏児）が、かつての「私」とルントウのように
      身分の差を超えた関係になっていることに気づき、自分たちの関係は身分の差によって
      疎遠になってしまったのに、子どもたちにはまだそれが可能であることに感慨を
      覚えたから。
    scoring_criteria: |
      【要素A: 2点】水生と宏児の関係が、かつての「私」とルントウの関係と重なっていること
      【要素B: 2点】自分たち（大人）の関係は身分の差で変わってしまったことへの言及
      【要素C: 1点】子どもたちの自然な関係に対する驚き・感慨

      注意:
      - 閏土の貧困・老化への衝撃は別の場面の話であり、この設問では的外れ
      - 「私も母も」二人同時に反応→子どもたちの様子を一緒に見ている場面と特定できる

  - id: 5
    description: |
      「地上の道」とあるが、これはどのようなものか。説明しなさい。
    type: "descriptive"
    max_points: 6
    model_answer: |
      今の社会ではまだはっきりとわからないが、多くの人が望み、行動すれば
      かなえられる新しい社会。
    scoring_criteria: |
      【要素A: 2点】今はまだはっきりしていない／実現していないということ
      【要素B: 2点】多くの人が望み行動すること（道＝歩く人が多くなればできる、の読み替え）
      【要素C: 2点】新しい社会の実現を意味していること

      注意:
      - 単に「希望のたとえ」だけでは不十分。「新しい社会」の実現という具体的意味が必要
      - 「故郷に続く物理的な道」と解釈した場合は0点
