# ============================================================
# 大阪大学 2022年 前期日程 現代文 採点基準
# ============================================================
# 出典: 飯田高「法と社会科学をつなぐ」
# 形式: 漢字4問 + 記述3問（60-80字×1、100-120字×2）
# ※解説プリント（高3授業用）に基づく採点基準
# ============================================================

exam_info:
  title: "現代文（大阪大学2022年前期）"
  source: "飯田高「法と社会科学をつなぐ」"
  total_points: 35
  pages_per_student: 1

notes: |
  【本文の要旨】
  イソップ寓話「北風と太陽」を出発点に、インセンティブ（特定の行動を選ぶよう仕向ける
  要因）の概念を論じる。寓話では、強制（北風）ではなく対象の自発的行動を引き出す方法
  （太陽）が成功している。インセンティブは経済学をはじめ社会科学全般の基盤概念であり、
  外発的動機づけ（報酬・罰則）と内発的動機づけ（自律的意思決定）に大別される。しかし
  両者の境界は曖昧で、法はその両方に関わる。イスラエルの託児所実験では、遅刻への罰金
  導入がかえって遅刻を増加させた。これは非金銭的な社会的交換関係が金銭的取引関係に
  変質し、親の内発的動機が失われた例である（クラウディング・アウト）。

  【出題の特徴】
  - 阪大型: 字数指定が明示的（60〜80字、100〜120字）
  - 社会科学の評論: 具体的な実験結果の読解・説明が問われる
  - 漢字は文脈内での読み書き能力を問う

  【採点上の注意】
  - 字数指定の過不足は減点対象（大幅超過・不足で-1〜-2点）
  - 本文の概念を正確に踏まえた説明を求める
  - 実験結果に基づく説明では、因果関係を具体的に示す必要がある
  - 「どういうことか」→ 文末「〜ということ。」、「なぜか」→ 文末「〜から。/〜ため。」
  - 【重要】形式点は減点方式。内容が的外れ（off_topic）なら0点
  - 要素の存在判定は「概念が含まれているか」で判断する。本文のキーワードと異なる表現でも同じ概念を指していれば要素ありと判定すること
  - 要素が概念的に含まれていれば、その要素の配点の7割以上を与える。キーワード不使用による減点は各要素の配点の3割以内にとどめる
  - 部分点の目安（要素数ベース）を最優先し、個別要素の微減で合計が目安を大きく下回らないようにする

questions:
  - id: 1
    description: "漢字の書き取り"
    type: "short_answer"
    max_points: 4
    scoring_criteria: "正確な字形のみ正答。各1点。"
    sub_questions:
      - id: "1-a"
        text: "音楽を（ア）カナデること"
        answer: "奏"
        points: 1
      - id: "1-b"
        text: "（イ）ジッタイに近い"
        answer: "実態"
        points: 1
      - id: "1-c"
        text: "太陽の（ウ）ホウリャクが"
        answer: "方略"
        points: 1
      - id: "1-d"
        text: "税制上の（エ）ユウグウ措置"
        answer: "優遇"
        points: 1

  - id: 2
    description: |
      傍線部(1)について、「北風と太陽」の寓話にこのような解釈がなされている理由を、
      本文の内容に基づき、60字から80字で説明しなさい。
    type: "descriptive"
    max_points: 8
    model_answer: |
      強制的に服を脱がせようとした北風ではなく、旅人が自発的に服を脱ぐよう
      仕向けるインセンティブを意識的に用いた太陽のほうが、服脱がせるという
      勝負に成功しているため。（78字）
    scoring_criteria: |
      【要素A: 1点】北風のやったこと＝「強制」（服を吹き飛ばそうとした）
      【要素B: 2点】「インセンティブ」の内容＝対象が自発的に行動するよう仕向けること
      【要素C: 2点】太陽がインセンティブを意識的に用いたこと
      【要素D: 1点】北風ではなく太陽が、という対比構造
      【要素E: 2点】服を脱がせることに成功した＝解釈の根拠としての結果

      部分点の目安:
      - 全要素 → 8点（満点）
      - A+B+C → 5-6点
      - B+Eのみ → 4点
      - 「太陽が優しかったから」程度 → 1-2点
      - 字数: 60〜80字。大幅超過・不足は-1点

  - id: 3
    description: |
      傍線部(2)について、著者はなぜそのように考えているのか。
      本文の内容に基づき、100字から120字で説明しなさい。
    type: "descriptive"
    max_points: 11
    model_answer: |
      行動に対する法の効果を研究する人たちが、法が発動するサンクションによる
      外からの動機づけと法の正統性や道徳に関する内からの動機づけのどちらがより
      重要かという問題設定に偏り、外発的・内発的という二分法にこだわりすぎて
      きた結果、両者の複雑な相互作用が十分に検討されてこなかったから。（117字）
    scoring_criteria: |
      【要素A: 3点】法の効果の研究者たちが外発的/内発的動機づけの二分法にこだわりすぎていたこと
      【要素B: 3点】法は外発的インセンティブ（サンクション）であると同時に、内発的動機づけにも関わること
      【要素C: 3点】「外からの動機づけ」と「内からの動機づけ」のどちらが重要かという問題設定に偏っていたこと
      【要素D: 2点】字数(100〜120字)・論理構成・文末

      部分点の目安:
      - 全要素 → 11点
      - A+Cで二分法の問題点を指摘 → 6-7点
      - Bのみ（法の二面性） → 3点
      - 「まだ研究が進んでいないから」程度の一般論 → 1-2点
      - 字数: 100〜120字。大幅超過・不足は-1点

  - id: 4
    description: |
      傍線部(3)について、本文で示された実験結果に基づき、
      100字から120字で具体的に説明しなさい。
    type: "descriptive"
    max_points: 12
    model_answer: |
      子どもを時間内に引き取りに来なかった親に罰金を課す制度を導入した
      託児所では、遅刻する親がかえって増加した。それまで好意に基づく社会的
      交換関係と認知されていた時間外預かりが、罰金の導入により金銭的な取引
      関係へと変質し、親が遅刻を自己抑制する内発的動機が失われたためである。（116字）
    scoring_criteria: |
      【要素A: 2点】実験の内容＝子どもを時間内に引き取りに来なかった親に罰金を課した
      【要素B: 2点】実験結果＝罰金を導入した施設では遅刻がかえって増加した
      【要素C: 2点】それまで非金銭的な好意（社会的交換関係）として認知されていた
      【要素D: 2点】金銭的な取引関係（お金を取って行うサービス）へと変質した
      【要素E: 2点】親が遅刻を自己抑制する内発的動機が失われた
      【要素F: 2点】外発的インセンティブ（罰金）が内発的動機づけを阻害した＝クラウディング・アウトの説明

      部分点の目安:
      - 全要素 → 12点
      - A+B+E → 6点（実験結果と結論のみ、因果関係の説明不足）
      - A+Bのみ → 4点（実験の記述のみ）
      - 「罰金を課したら逆効果だった」程度 → 2-3点
      - 字数: 100〜120字。大幅超過・不足は-1点
