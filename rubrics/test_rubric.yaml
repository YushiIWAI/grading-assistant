# テスト用採点基準
# generate_test_data.py で生成した答案PDFに対応

exam_info:
  title: "国語テスト（テスト用）"
  total_points: 30
  pages_per_student: 1

notes: |
  - 問1は完全一致のみ正解
  - 問2・問3は部分点を認める
  - 誤字脱字は内容に影響しない範囲では減点しない

questions:
  - id: 1
    description: "空欄補充（記号選択）：「彼の説明は終始（　）としており、聞く者を深く納得させた。」"
    type: short_answer
    max_points: 5
    scoring_criteria: "正答「ア. 明瞭」のみ正解。5点 or 0点。"
    sub_questions:
      - id: "1"
        text: "ア.明瞭 イ.曖昧 ウ.冗長 エ.簡潔 から選択"
        answer: "ア"
        points: 5

  - id: 2
    description: "本文の要約（60字以内）：SNSと情報リテラシーに関する文章の要旨をまとめる"
    type: descriptive
    max_points: 10
    model_answer: "SNSの普及で真偽不明の情報が氾濫する現代では、複数の情報源を比較し批判的に検討するメディアリテラシーが不可欠である。"
    scoring_criteria: |
      以下の観点で採点する:
      - 「情報の氾濫」「真偽不明の情報」に言及している: 3点
      - 「メディアリテラシー」「批判的検討」「情報を見極める力」に言及している: 4点
      - 要約として論理的にまとまっている（主語・述語が対応し、日本語として自然）: 3点
      部分点あり。キーワードが含まれていなくても、趣旨を捉えていれば加点。
      白紙・未記入は0点。

  - id: 3
    description: "自分の意見（100字以内）：「情報との向き合い方」について本文を踏まえて述べる"
    type: descriptive
    max_points: 15
    model_answer: ""
    scoring_criteria: |
      以下の観点で採点する:
      - 本文の主張（メディアリテラシーの重要性）を踏まえている: 3点
      - 自分の意見が明確に述べられている: 4点
      - 具体的な例や根拠が示されている: 4点
      - 論理的な構成になっている（主張→根拠→まとめ等）: 4点
      本文と無関係な内容のみの場合は、上記1つ目の観点は0点。
      「わからない」「特にない」等のみの場合は0点。
      白紙・未記入は0点。
