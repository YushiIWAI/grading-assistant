# ============================================================
# 東大型 現代文模擬試験 採点基準
# ============================================================
# 出典（架空）: 石川哲郎「聴くことの倫理――対話における受動性の意味」
# 形式: 東大 第一問 準拠（2行論述×3 + 120字論述×1 + 漢字×3）
# ============================================================

exam_info:
  title: "現代文（東大型模擬試験）"
  total_points: 50
  pages_per_student: 1

notes: |
  【本文の要旨】
  現代社会では効率的な情報伝達が「よいコミュニケーション」とされるが、対話の本質は
  合理的な情報交換にはない。「聴く」とは相手の言葉を自分の既有の理解の枠組みに回収
  することではなく、自分の了解の枠組みそのものが揺さぶられる経験である。対話における
  沈黙は、コミュニケーションの不在ではなく、相手の言葉の「わからなさ」にとどまり、
  他者の他者性を損なわずに向き合っている状態である。一方、「わかりやすさ」への過度な
  志向は、他者の言葉に含まれる多義性や曖昧さを切り捨て、他者の固有性との出会いを
  閉ざしてしまう。聴くことの倫理とは「わからなさ」のなかにとどまり続ける持続的な
  意志であり、それによって自己の認識の変容と他者との真の出会いが可能になると筆者は
  論じている。

  【採点上の注意】
  - 東大型の記述問題は、本文中のキーワード・概念を正確に踏まえた上で、自分の言葉で
    再構成して説明できているかを見る
  - 2行論述は60〜70字程度が目安（解答欄の大きさ）
  - 問五の120字論述は字数の過不足にも注意
  - 漢字は正確な字形のみ正答とする
  - 「どういうことか」→ 文末「〜ということ。」
  - 「なぜか」→ 文末「〜から。」

questions:
  - id: 1
    description: "漢字の書き取り"
    type: "short_answer"
    max_points: 6
    scoring_criteria: "正確な字形のみ正答。崩し字や誤字は不可。各2点。"
    sub_questions:
      - id: "1-a"
        text: "対話の（ア）ホンシツは情報交換にはない"
        answer: "本質"
        points: 2
      - id: "1-b"
        text: "他者の言葉を（イ）ジュヨウする"
        answer: "受容"
        points: 2
      - id: "1-c"
        text: "自己の認識の（ウ）ヘンヨウが始まる"
        answer: "変容"
        points: 2

  - id: 2
    description: |
      傍線部(ア)「聴くということは、相手の言葉を自分の了解の枠内に回収する営みではなく、
      むしろ自分の了解の枠組みそのものが揺さぶられる経験である」とはどういうことか、
      説明せよ。（2行）
    type: "descriptive"
    max_points: 14
    model_answer: |
      聴くとは相手の発言を自分の既有の理解に当てはめて処理することではなく、
      相手の言葉のなかに自分の予期を超えた意味を見出すことで、
      自分自身の認識の前提そのものが問い直される経験だということ。
    scoring_criteria: |
      【要素A: 4点】「了解の枠内に回収する＝既有の理解に同化させる」の否定を正確に言い換えている
      【要素B: 5点】「枠組みそのものが揺さぶられる＝認識の前提・理解の枠組み自体が変容する」を説明
      【要素C: 3点】「予期を超えた意味」「自分の理解を超えたもの」に触れている
      【表現: 2点】文末「〜ということ。」で結び、論理的に一文で構成されている

      部分点の目安:
      - A+B+C+表現 → 14点（満点）
      - A+Bのみ → 9点
      - BまたはCのみ → 4-5点
      - 表面的な言い換えのみ → 2-3点

  - id: 3
    description: |
      傍線部(イ)「沈黙は対話の失敗ではなく、対話がもっとも深く成立している瞬間で
      ありうる」のはなぜか、説明せよ。（2行）
    type: "descriptive"
    max_points: 10
    model_answer: |
      沈黙とは、相手の言葉を十分に受け止めた上で安易にわかったつもりにならず、
      「わからなさ」にとどまっている状態であり、それこそが他者の他者性を損なわずに
      向き合う対話の本質的なあり方だから。
    scoring_criteria: |
      【要素A: 4点】沈黙＝「わからなさ」にとどまっている状態、安易な理解を拒否している状態
      【要素B: 3点】他者の他者性を損なわない・尊重する態度であること
      【要素C: 2点】対話の本質・核心との結びつき
      【表現: 1点】文末「〜から。」で結んでいる

      部分点の目安:
      - A+B+C → 10点
      - Aのみ正確 → 4点
      - 「深く考えている」程度の記述 → 2-3点

  - id: 4
    description: |
      傍線部(ウ)「『わかりやすさ』への志向が、かえって他者との関係を貧しくする」
      とはどういうことか、説明せよ。（2行）
    type: "descriptive"
    max_points: 10
    model_answer: |
      相手の言葉を手早く理解可能な形に整理しようとする態度は、
      言葉に含まれる多義性や曖昧さという他者の固有性の表れを切り捨て、
      真の出会いの可能性を閉ざしてしまうということ。
    scoring_criteria: |
      【要素A: 4点】「わかりやすさ」＝相手の言葉を明瞭な形に整理・還元する態度
      【要素B: 4点】多義性・曖昧さ＝他者の固有性が切り捨てられること
      【要素C: 2点】結果として他者との「真の出会い」「深い関係」が不可能になること

      部分点の目安:
      - A+B+C → 10点
      - AまたはBのみ → 4点
      - 一般論（「大切なことが伝わらない」等）→ 1-2点

  - id: 5
    description: |
      筆者は「聴くこと」の意義をどのように捉えているか、本文全体の趣旨を踏まえて
      120字以内で説明せよ。（4行）
    type: "descriptive"
    max_points: 10
    model_answer: |
      筆者は、聴くことの本質を、相手の言葉を自分の理解の枠組みに取り込むことではなく、
      自分の理解を超えた他者の言葉の前で立ち止まり、わからなさを引き受けることに見出して
      いる。この受動的な態度こそが自己の認識の変容を可能にし、他者と真に出会う対話の条件
      であると論じている。
    scoring_criteria: |
      【要素A: 3点】聴く＝既有の枠組みへの同化ではない（否定面）
      【要素B: 3点】わからなさにとどまる・受動的態度（肯定面）
      【要素C: 2点】自己の認識の変容につながる
      【要素D: 2点】他者との真の出会い・対話の条件であること

      部分点の目安:
      - 4要素全て → 10点
      - 3要素 → 7-8点
      - 2要素 → 5点
      - 表面的な要約のみ → 2-3点
      - 120字を大幅に超過 → -1点
